<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />

<title>Maison Élysées — Réservation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Manrope:wght@300;400;500;600;700&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1EA;
    --bg-2: #EBE5DA;
    --ink: #0E0E0C;
    --ink-2: #2A2823;
    --muted: #7A746A;
    --line: #1f1d18;
    --line-soft: rgba(14,14,12,0.18);
    --gold: oklch(0.72 0.09 75);
    --gold-deep: oklch(0.55 0.10 70);
    --paper: #FBF8F2;
    --shadow: 0 30px 60px -30px rgba(14,14,12,0.35);
    --serif: "Cormorant Garamond", "Times New Roman", serif;
    --display: "Tenor Sans", "Cormorant Garamond", serif;
    --sans: "Manrope", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select { font-family: inherit; }
  ::selection { background: var(--ink); color: var(--bg); }
  .app-root { min-height: 100vh; }
</style>
</head>
<body>
  <div id="root" class="app-root"></div>

  <script>
